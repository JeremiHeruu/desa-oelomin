<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Galeri - Desa Oelomin</title>
<meta name="description" content="Website resmi Desa Oelomin berisi informasi, potensi desa, galeri dan layanan masyarakat.">
<meta name="keywords" content="Desa Oelomin, Desa Kupang, Pemerintahan Desa, Potensi Desa">

<link rel="stylesheet" href="assets/css/style.css">

<style>
.slider {
    max-width: 900px;
    margin: auto;
    position: relative;
}

.slider img {
    width: 100%;
    height: 450px;          /* Ubah sesuai kebutuhan */
    object-fit: cover;      /* Penting */
    border-radius: 10px;
    display: none;
}

.slider img.active {
    display: block;
}

.slider-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 50%;
}

.prev { left: 10px; }
.next { right: 10px; }

.detail-content {
    text-align: center;
    max-width: 800px;
    margin: 30px auto;
}

.detail-content h2 {
    font-size: 28px;
    margin-bottom: 15px;
}

.detail-content p {
    font-size: 16px;
    line-height: 1.7;
    color: #555;
    text-align: justify;
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">
            <div class="logo-icon">🏡</div>
            <span>Desa Oelomin</span>
        </a>
    </div>
</nav>

<section class="section">
<div class="container">
<br><br><br>
    <div class="slider" id="slider">
        <!-- gambar masuk di sini -->
        <button onclick="prevSlide()" class="slider-btn prev">❮</button>
        <button onclick="nextSlide()" class="slider-btn next">❯</button>
    </div>

    <div id="detailText" style="margin-top:30px;"></div>

    <div style="margin-top:30px;">
        <a href="galeri.html" class="btn btn-primary">
            ← Kembali ke Galeri
        </a>
    </div>

</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
let currentIndex = 0;
let totalImages = 0;

document.addEventListener("DOMContentLoaded", async function(){

    const supabase = window.supabase.createClient(
        "https://jvhxeijxcmogqvtvjfoj.supabase.co",
        "sb_publishable_fg8x9X1V3Z1baHAGlQIFxA_USfTgJ2S"
    );

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if(!id){
        document.getElementById("slider").innerHTML = "<p>Album tidak ditemukan</p>";
        return;
    }

    const { data: album } = await supabase
        .from("galeri")
        .select("*")
        .eq("id", id)
        .single();

    const { data: images } = await supabase
        .from("galeri_images")
        .select("*")
        .eq("galeri_id", id);

    if(!images || images.length === 0){
        document.getElementById("slider").innerHTML = "<p>Tidak ada gambar</p>";
        return;
    }

    const slider = document.getElementById("slider");

    images.forEach((img, index)=>{
        const image = document.createElement("img");
        image.src = img.gambar_url;
        if(index === 0) image.classList.add("active");
        slider.insertBefore(image, slider.firstChild);
    });

    totalImages = images.length;

    document.getElementById("detailText").innerHTML = `
        <div class="detail-content">
            <h2>${album?.judul || ""}</h2>
            <p>${album?.deskripsi || ""}</p>
        </div>
    `;
});

function showSlide(index){
    const images = document.querySelectorAll("#slider img");
    images.forEach(img => img.classList.remove("active"));
    images[index].classList.add("active");
}

function nextSlide(){
    currentIndex = (currentIndex + 1) % totalImages;
    showSlide(currentIndex);
}

function prevSlide(){
    currentIndex = (currentIndex - 1 + totalImages) % totalImages;
    showSlide(currentIndex);
}
</script>

</body>

</html>
